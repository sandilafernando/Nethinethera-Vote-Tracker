<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSC Vote Tracker</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22bg%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%235a90ff%22%2F%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%238fc2ff%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20x%3D%222%22%20y%3D%222%22%20width%3D%2260%22%20height%3D%2260%22%20rx%3D%2214%22%20fill%3D%22url(%23bg)%22%2F%3E%3Cpath%20d%3D%22M16%2040V24h6l5%208%205-8h6v16h-5V31l-6%209-6-9v9h-5z%22%20fill%3D%22%230b1b3a%22%2F%3E%3Cpath%20d%3D%22M44%2024h6v16h-6z%22%20fill%3D%22%230b1b3a%22%2F%3E%3C%2Fsvg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --bg-main: #050917;
      --bg-card: rgba(20, 33, 61, 0.5);
      --bg-card-2: rgba(16, 24, 46, 0.7);
      --text-main: #f4f7ff;
      --text-muted: #a5b4d6;
      --line: rgba(180, 198, 255, 0.18);
      --accent: #69a3ff;
      --gold: #ffcc4d;
      --silver: #cfd8ea;
      --bronze: #d79b6e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(85, 125, 255, 0.22), transparent 40%),
        radial-gradient(circle at 85% 0%, rgba(87, 224, 255, 0.15), transparent 35%),
        linear-gradient(155deg, #040812 0%, #090f21 45%, #050917 100%);
      color: var(--text-main);
      padding: 28px 20px;
      overflow-x: hidden;
      position: relative;
    }

    .bg-orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(45px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.35;
      animation: floatOrb 14s ease-in-out infinite;
    }

    .bg-orb.orb-1 {
      width: 300px;
      height: 300px;
      background: rgba(93, 125, 255, 0.55);
      top: -70px;
      left: -50px;
    }

    .bg-orb.orb-2 {
      width: 260px;
      height: 260px;
      background: rgba(89, 235, 255, 0.32);
      bottom: -80px;
      right: 5%;
      animation-delay: -3s;
      animation-duration: 18s;
    }

    .bg-orb.orb-3 {
      width: 220px;
      height: 220px;
      background: rgba(255, 196, 94, 0.25);
      top: 35%;
      right: 35%;
      animation-delay: -7s;
      animation-duration: 16s;
    }

    .dashboard {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .glass {
      background: linear-gradient(145deg, var(--bg-card), var(--bg-card-2));
      border: 1px solid var(--line);
      box-shadow:
        0 30px 40px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
    }

    .title-block h1 {
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .title-block p {
      color: var(--text-muted);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .share-fab-wrap {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 50;
    }

    .fab-btn {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(168, 197, 255, 0.42);
      background: linear-gradient(135deg, rgba(85, 139, 255, 0.48), rgba(120, 200, 255, 0.35));
      color: #eef4ff;
      font-size: 1.15rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
    }

    .fab-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(104, 167, 255, 0.35);
    }

    .fab-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .countdown {
      text-align: right;
      min-width: 260px;
    }

    .countdown .label {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    #countdown {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .time-box {
      min-width: 60px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(145, 177, 255, 0.3);
      background: rgba(22, 36, 66, 0.55);
      text-align: center;
    }

    .time-box strong {
      display: block;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .time-box span {
      color: var(--text-muted);
      font-size: 0.72rem;
      letter-spacing: 0.7px;
      text-transform: uppercase;
    }

    .section-title {
      font-size: 1.1rem;
      margin-bottom: 14px;
      color: #d8e3ff;
      font-weight: 700;
    }

    .podium-card {
      padding: 22px 24px 26px;
    }

    .podium-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      align-items: end;
    }

    .podium-item {
      position: relative;
      border: 1px solid rgba(170, 191, 255, 0.22);
      border-radius: 14px;
      overflow: hidden;
      padding: 14px 14px 12px;
      background: rgba(19, 31, 57, 0.82);
      transform-origin: bottom center;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .podium-item:hover {
      transform: translateY(-6px);
    }

    .podium-item::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    .podium-item * {
      position: relative;
      z-index: 1;
    }

    .podium-rank {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .school-identity {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .logo-cell {
      position: relative;
      flex-shrink: 0;
      width: 48px;
      height: 48px;
    }

    .school-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .school-logo.is-hidden {
      display: none;
    }

    .school-logo-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.4px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(90, 144, 255, 0.5), rgba(140, 200, 255, 0.35));
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #eef4ff;
    }

    .school-logo-fallback.is-hidden {
      display: none;
    }

    .school-text {
      flex: 1;
      min-width: 0;
    }

    .school-title {
      font-size: 1rem;
      font-weight: 600;
      color: #e8eeff;
      line-height: 1.3;
    }

    .podium-item .school-title {
      font-size: 1.05rem;
    }

    .media-unit {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.35;
    }

    .podium-votes {
      font-size: 1.55rem;
      font-weight: 800;
      line-height: 1;
    }

    .podium-height {
      margin-top: 12px;
      border-radius: 9px;
      width: 100%;
      min-height: 60px;
      background: rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .podium-height span {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0;
      border-radius: 99px;
    }

    .podium-gold {
      box-shadow: 0 0 22px rgba(255, 204, 77, 0.25);
      transform: scale(1.04);
      border-color: rgba(255, 217, 100, 0.7);
    }
    .podium-gold::before { background: linear-gradient(165deg, #ffd964, #8a5b00); }
    .podium-gold .podium-rank { color: #ffd964; }
    .podium-gold .podium-height span { background: linear-gradient(to top, #6d4500, #ffcc4d); }

    .podium-silver {
      box-shadow: 0 0 20px rgba(213, 223, 244, 0.22);
    }
    .podium-silver::before { background: linear-gradient(165deg, #d9e3f7, #556787); }
    .podium-silver .podium-rank { color: #d9e3f7; }
    .podium-silver .podium-height span { background: linear-gradient(to top, #4f607d, #d9e3f7); }

    .podium-bronze {
      box-shadow: 0 0 20px rgba(215, 155, 110, 0.22);
    }
    .podium-bronze::before { background: linear-gradient(165deg, #dfac82, #7f4a20); }
    .podium-bronze .podium-rank { color: #dfac82; }
    .podium-bronze .podium-height span { background: linear-gradient(to top, #733f1f, #d79b6e); }

    .first-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #ffe5a8;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .leaderboard-card {
      padding: 22px 24px 26px;
    }

    .board-list {
      display: grid;
      gap: 12px;
    }

    .board-item {
      border: 1px solid rgba(171, 192, 255, 0.18);
      background: rgba(18, 28, 50, 0.65);
      border-radius: 12px;
      padding: 12px 14px;
      transition: transform 0.28s ease, border-color 0.28s ease;
    }

    .board-item:hover {
      transform: translateY(-4px);
      border-color: rgba(171, 205, 255, 0.45);
    }

    .board-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .board-meta .school-identity {
      flex: 1;
      min-width: 0;
    }

    .board-name {
      font-weight: 600;
      color: #e8eeff;
    }

    .board-votes {
      flex-shrink: 0;
      text-align: right;
      font-weight: 700;
      color: #c7d7ff;
      font-size: 0.95rem;
    }

    .bar-track {
      position: relative;
      height: 10px;
      border-radius: 999px;
      background: rgba(132, 161, 238, 0.18);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #5a90ff, #8fc2ff);
      box-shadow: 0 0 18px rgba(112, 171, 255, 0.45);
      transform-origin: left center;
      position: relative;
      overflow: hidden;
    }

    .bar-fill::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 10%, rgba(255, 255, 255, 0.45), transparent 90%);
      transform: translateX(-120%);
      animation: shine 2.6s linear infinite;
    }

    .status {
      font-size: 0.9rem;
      color: var(--text-muted);
      padding: 14px 24px;
      border-radius: 12px;
    }

    .footer {
      text-align: center;
      padding: 14px 10px 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .export-updated {
      text-align: center;
      color: #d7e5ff;
      font-size: 0.84rem;
      margin-top: 12px;
      letter-spacing: 0.2px;
    }

    @keyframes floatOrb {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      50% {
        transform: translate3d(0, -28px, 0) scale(1.07);
      }
    }

    @keyframes shine {
      to {
        transform: translateX(120%);
      }
    }

    @media (max-width: 900px) {
      .podium-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
  <main class="dashboard">
    <section class="glass header">
      <div class="title-block">
        <h1>Nethinethera Vote Tracker</h1>
        <p>Live Rank Votes</p>
      </div>
      <div class="countdown">
        <div class="label">Countdown to April 21, 2026</div>
        <div id="countdown"></div>
      </div>
    </section>

    <section class="glass podium-card">
      <h2 class="section-title">Top 3 Podium 🏆</h2>
      <div id="podium" class="podium-grid"></div>
    </section>

    <section class="glass leaderboard-card">
      <h2 class="section-title">Leaderboard</h2>
      <div id="board" class="board-list"></div>
      <p id="status" class="status"></p>
      <p id="exportUpdated" class="export-updated"></p>
    </section>
    <footer class="footer">&copy; Educational Media Unit of Maris Stella College Negombo.</footer>
  </main>
  <div class="share-fab-wrap">
    <button id="shareBtn" class="fab-btn" type="button" title="Share PNG" aria-label="Share PNG">⤴</button>
    <button id="downloadBtn" class="fab-btn" type="button" title="Download PNG" aria-label="Download PNG">⬇</button>
  </div>

  <script>
    // ─── Hardcoded school metadata ───────────────────
    const SCHOOLS_META = {
      "59": { "school": "Maris Stella College, Negombo", "mediaUnit": "Educational Media Unit", "logo": "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/1.png" },
      "58": { "school": "Galahitiyawa Central College", "mediaUnit": "Parakum Sihanada Media Unit", "logo": "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/2.png" },
      "24": { "school": "Yasodara Balika Vidyalaya", "mediaUnit": "Media Unit Of Yasodara Vidyalaya", "logo": "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/6.png" },
      "57": { "school": "Devi Balika Vidyalaya", "mediaUnit": "Media unit of Devi Balika Vidyalaya", "logo": "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/3.png" },
      "16": { "school": "Nugegoda South International School (NSIS)", "mediaUnit": "Media Unit of NSIS Nittambuwa", "logo": "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/10.png" },
      "21": { "school": "D. S. Senanayake College", "mediaUnit": "Media circle of D. S. Senanayake College", "logo": "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/8.png" },
      "51": { "school": "St. Aloysius' College, Galle", "mediaUnit": "Aloysian Mass Media Unit", "logo": "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/4.png" },
      "19": { "school": "Mahinda Rajapaksa College", "mediaUnit": "Mahindians Media and Broadcasting Unit", "logo": "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/9.png" },
      "33": { "school": "Anula Vidyalaya", "mediaUnit": "Media Unit of Anula Vidyalaya", "logo": "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/5.png" },
      "23": { "school": "Muslim Ladies College", "mediaUnit": "Media Unit of Muslim Ladies College", "logo": "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/7.png" }
    };

    const schoolNames = {
      59: "Maris Stella", 58: "Galahitiyawa", 24: "Yasodara Balika", 57: "Devi Balika",
      16: "NSIS", 21: "D.S. Senanayake", 51: "St. Aloysius", 19: "Mahinda Rajapaksha",
      33: "Anula", 23: "Muslim Ladies"
    };

    // ─── Live votes endpoint (Directly from your sync_votes.py logic) ──────────
    const votesApiUrl = "https://osxijjbjgxvaeurpghtv.supabase.co/rest/v1/mpmu_votes?select=registered_candidate,vote_count&apikey=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zeGlqamJqZ3h2YWV1cnBnaHR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NTA4NDgsImV4cCI6MjA4NzMyNjg0OH0.8SxJtzpnr0snvzXke_bIwkcVpwUfMxRfb0Y407Z0UE4";

    const fallbackVotes = [
      { registered_candidate: 16, vote_count: 60 }, { registered_candidate: 21, vote_count: 54 },
      { registered_candidate: 19, vote_count: 10 }, { registered_candidate: 23, vote_count: 7 },
      { registered_candidate: 51, vote_count: 17 }, { registered_candidate: 33, vote_count: 9 },
      { registered_candidate: 59, vote_count: 325 }, { registered_candidate: 57, vote_count: 113 },
      { registered_candidate: 58, vote_count: 159 }, { registered_candidate: 24, vote_count: 123 }
    ];

    const podiumEl = document.getElementById("podium");
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const countdownEl = document.getElementById("countdown");
    const exportUpdatedEl = document.getElementById("exportUpdated");
    const shareBtn = document.getElementById("shareBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    let schoolsByCandidate = {};
    let hasInitialRender = false;
    let lastDataSignature = "";
    let motionInitialized = false;

    function loadSchoolsMeta() {
      schoolsByCandidate = normalizeSchoolsMeta(SCHOOLS_META);
    }

    function pickSchoolRowFields(row) {
      if (!row || typeof row !== "object") return { school: "", mediaUnit: "", logo: "" };
      const school = [row.school, row.school_name, row.full_name, row.name, row.display_name, row.title].find((v) => typeof v === "string" && v.trim()) || "";
      const mediaUnit = [row.mediaUnit, row.media_unit, row.media_unit_name, row.emu, row.emu_name, row.educational_media_unit].find((v) => typeof v === "string" && v.trim()) || "";
      const logo = [row.logo, row.logo_url, row.logoUrl, row.school_logo, row.logo_link, row.crest_url, row.image_url, row.photo_url].find((v) => typeof v === "string" && v.trim()) || "";
      return { school: school.trim(), mediaUnit: mediaUnit.trim(), logo: logo.trim() };
    }

    function normalizeSchoolsMeta(raw) {
      const out = {};
      for (const [k, v] of Object.entries(raw)) {
        const id = Number(k);
        const f = pickSchoolRowFields(v);
        if (f.school) out[id] = f;
      }
      return out;
    }

    function getSchoolMeta(id) {
      const m = schoolsByCandidate[id];
      if (m && m.school) return m;
      return { school: (schoolNames[id] || `School #${id}`) + " College", mediaUnit: "", logo: "" };
    }

    function escapeHtml(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

    function getInitials(label) {
      const parts = String(label).replace(/['']/g, " ").split(/\s+/).filter(Boolean);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return (label.slice(0, 2) || "?").toUpperCase();
    }

    function schoolIdentityHtml(meta) {
      const initials = getInitials(meta.school);
      const hasLogo = Boolean(meta.logo);
      const imgTag = hasLogo ? `<img class="school-logo" src="${meta.logo}" alt="" crossorigin="anonymous" loading="lazy" onerror="this.classList.add('is-hidden'); this.nextElementSibling.classList.remove('is-hidden');">` : "";
      return `
        <div class="school-identity">
          <div class="logo-cell">
            ${imgTag}
            <div class="school-logo-fallback ${hasLogo ? 'is-hidden' : ''}">${escapeHtml(initials)}</div>
          </div>
          <div class="school-text">
            <div class="school-title">${escapeHtml(meta.school)}</div>
            ${meta.mediaUnit ? `<div class="media-unit">${escapeHtml(meta.mediaUnit)}</div>` : ""}
          </div>
        </div>`;
    }

    function normalizeVotes(data) {
      return data.map(i => ({ registered_candidate: Number(i.registered_candidate), vote_count: Number(i.vote_count) }))
        .filter(i => !isNaN(i.registered_candidate) && !isNaN(i.vote_count))
        .sort((a, b) => b.vote_count - a.vote_count);
    }

    function renderCountdown() {
      const target = new Date("2026-04-21T00:00:00"), diff = target - new Date();
      if (diff <= 0) { countdownEl.innerHTML = "EXPIRED"; return; }
      const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
      countdownEl.innerHTML = `
        <div class="time-box"><strong>${d}</strong><span>Days</span></div>
        <div class="time-box"><strong>${h}</strong><span>Hrs</span></div>
        <div class="time-box"><strong>${m}</strong><span>Min</span></div>
        <div class="time-box"><strong>${s}</strong><span>Sec</span></div>`;
    }

    function renderDashboard(sortedVotes) {
      const top3 = sortedVotes.slice(0, 3), others = sortedVotes.slice(3), max = sortedVotes[0]?.vote_count || 1;
      const rankClass = ["podium-gold", "podium-silver", "podium-bronze"], labels = ["1st Place", "2nd Place", "3rd Place"];

      podiumEl.innerHTML = top3.map((item, i) => {
        const h = Math.max(30, (item.vote_count / max) * 100), meta = getSchoolMeta(item.registered_candidate);
        return `<article class="podium-item ${rankClass[i]}" data-candidate="${item.registered_candidate}">
          <div class="podium-rank">${labels[i]}</div>
          ${schoolIdentityHtml(meta)}
          ${i === 0 ? "<div class='first-badge'>🏆 Champion</div>" : ""}
          <div class="podium-votes">${item.vote_count.toLocaleString()}</div>
          <div class="podium-height"><span data-height="${h}"></span></div>
        </article>`;
      }).join("");

      boardEl.innerHTML = others.map(item => {
        const w = (item.vote_count / max) * 100, meta = getSchoolMeta(item.registered_candidate);
        return `<article class="board-item" data-candidate="${item.registered_candidate}">
          <div class="board-meta">${schoolIdentityHtml(meta)}<div class="board-votes">${item.vote_count.toLocaleString()} votes</div></div>
          <div class="bar-track"><div class="bar-fill" data-width="${w}"></div></div>
        </article>`;
      }).join("");

      animateDashboard(hasInitialRender);
      hasInitialRender = true;
      statusEl.textContent = `Live: Updated ${new Date().toLocaleTimeString()}`;
    }

    function animateDashboard(isUpdate) {
      if (!isUpdate) {
        gsap.from(".glass", { y: 20, opacity: 0, duration: 0.6, stagger: 0.1 });
        gsap.from(".podium-item", { y: 20, opacity: 0, duration: 0.6, stagger: 0.1 });
      }
      gsap.utils.toArray(".podium-height span").forEach(b => gsap.to(b, { height: b.dataset.height + "%", duration: 1 }));
      gsap.utils.toArray(".bar-fill").forEach(b => gsap.to(b, { width: b.dataset.width + "%", duration: 1 }));
      if (!motionInitialized) {
        gsap.to(".bg-orb", { y: -20, duration: 8, repeat: -1, yoyo: true, ease: "sine.inOut" });
        motionInitialized = true;
      }
    }

    function updateOnlyChangedValues(sortedVotes) {
      const max = sortedVotes[0]?.vote_count || 1;
      const currentIds = Array.from(document.querySelectorAll("[data-candidate]")).map(el => Number(el.dataset.candidate));
      const nextIds = sortedVotes.map(v => v.registered_candidate);

      if (JSON.stringify(currentIds) !== JSON.stringify(nextIds)) {
        renderDashboard(sortedVotes);
        return;
      }

      sortedVotes.forEach(item => {
        const node = document.querySelector(`[data-candidate="${item.registered_candidate}"]`);
        if (!node) return;
        const voteEl = node.querySelector(".podium-votes, .board-votes"), bar = node.querySelector(".podium-height span, .bar-fill");
        const nextV = item.vote_count.toLocaleString() + (node.classList.contains("board-item") ? " votes" : "");
        if (voteEl && voteEl.textContent !== nextV) {
          voteEl.textContent = nextV;
          gsap.fromTo(voteEl, { scale: 1.2 }, { scale: 1, duration: 0.4 });
        }
        if (bar) {
          const val = node.classList.contains("podium-item") ? Math.max(30, (item.vote_count / max) * 100) : (item.vote_count / max) * 100;
          gsap.to(bar, { [node.classList.contains("podium-item") ? 'height' : 'width']: val + "%", duration: 0.6 });
        }
      });
      statusEl.textContent = `Auto-updated ${new Date().toLocaleTimeString()}`;
    }

    async function loadVotes() {
      try {
        if (Object.keys(schoolsByCandidate).length === 0) loadSchoolsMeta();
        const res = await fetch(votesApiUrl, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        const normalized = normalizeVotes(data);
        const sig = JSON.stringify(normalized);
        if (!hasInitialRender) { renderDashboard(normalized); lastDataSignature = sig; }
        else if (sig !== lastDataSignature) { updateOnlyChangedValues(normalized); lastDataSignature = sig; }
      } catch (e) {
        if (!hasInitialRender) renderDashboard(normalizeVotes(fallbackVotes));
        statusEl.textContent = "Updating...";
      }
    }

    renderCountdown();
    setInterval(renderCountdown, 1000);
    loadVotes();
    setInterval(loadVotes, 5000); // Checks every 5 seconds as requested

    // PNG Export
    async function capture() {
      const canvas = await html2canvas(document.querySelector(".dashboard"), { scale: 2, useCORS: true, backgroundColor: "#050917" });
      return canvas.toDataURL("image/png");
    }
    shareBtn.onclick = async () => {
      try {
        const img = await capture();
        const res = await fetch(img);
        const blob = await res.blob();
        const file = new File([blob], "votes.png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) navigator.share({ files: [file] });
        else alert("Sharing not supported, please download instead.");
      } catch (e) {}
    };
    downloadBtn.onclick = async () => {
      const a = document.createElement("a"); a.href = await capture(); a.download = "votes.png"; a.click();
    };
  </script>
</body>
</html>
