<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSC Vote Tracker</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22bg%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%235a90ff%22%2F%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%238fc2ff%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20x%3D%222%22%20y%3D%222%22%20width%3D%2260%22%20height%3D%2260%22%20rx%3D%2214%22%20fill%3D%22url(%23bg)%22%2F%3E%3Cpath%20d%3D%22M16%2040V24h6l5%208%205-8h6v16h-5V31l-6%209-6-9v9h-5z%22%20fill%3D%22%230b1b3a%22%2F%3E%3Cpath%20d%3D%22M44%2024h6v16h-6z%22%20fill%3D%22%230b1b3a%22%2F%3E%3C%2Fsvg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --bg-main: #050917;
      --bg-card: rgba(20, 33, 61, 0.5);
      --bg-card-2: rgba(16, 24, 46, 0.7);
      --text-main: #f4f7ff;
      --text-muted: #a5b4d6;
      --line: rgba(180, 198, 255, 0.18);
      --accent: #69a3ff;
      --gold: #ffcc4d;
      --silver: #cfd8ea;
      --bronze: #d79b6e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(85,125,255,0.22), transparent 40%),
        radial-gradient(circle at 85% 0%, rgba(87,224,255,0.15), transparent 35%),
        linear-gradient(155deg, #040812 0%, #090f21 45%, #050917 100%);
      color: var(--text-main);
      padding: 16px 14px 90px;
      overflow-x: hidden;
      position: relative;
    }

    /* ─── Orbs ──────────────────────────────────────────── */
    .bg-orb {
      position: fixed; border-radius: 999px;
      filter: blur(60px); pointer-events: none; z-index: -1; opacity: 0;
    }
    .bg-orb.orb-1 { width:380px;height:380px;background:radial-gradient(circle,rgba(93,125,255,0.72),rgba(60,90,220,0.3));top:-90px;left:-60px; }
    .bg-orb.orb-2 { width:320px;height:320px;background:radial-gradient(circle,rgba(89,235,255,0.5),rgba(40,160,200,0.2));bottom:-100px;right:5%; }
    .bg-orb.orb-3 { width:260px;height:260px;background:radial-gradient(circle,rgba(255,196,94,0.45),rgba(200,130,50,0.2));top:40%;right:30%; }
    .bg-orb.orb-4 { width:200px;height:200px;background:radial-gradient(circle,rgba(180,100,255,0.35),rgba(120,60,200,0.15));top:20%;left:60%; }

    /* ─── Layout ─────────────────────────────────────────── */
    .dashboard { max-width: 1100px; margin: 0 auto; display: grid; gap: 16px; }

    .glass {
      background: linear-gradient(145deg, var(--bg-card), var(--bg-card-2));
      border: 1px solid var(--line);
      box-shadow: 0 30px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* ─── Header ─────────────────────────────────────────── */
    .header {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: space-between; align-items: flex-start;
      padding: 16px 18px;
    }
    .title-block h1 {
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      font-weight: 800; letter-spacing: 0.2px;
    }
    .title-block p { color: var(--text-muted); margin-top: 4px; font-size: 0.88rem; }

    /* ─── Header right block (top school + live) ─────────── */
    .header-right {
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
      min-width: 0; flex-shrink: 0;
    }

    /* ─── Live indicator ──────────────────────────────────── */
    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: #6dffaa;
      background: rgba(30, 200, 100, 0.12);
      border: 1px solid rgba(80, 220, 130, 0.35);
      border-radius: 999px; padding: 4px 10px;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4eff9a;
      box-shadow: 0 0 6px #4eff9a;
      animation: livePulse 1.6s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 6px #4eff9a; }
      50%       { opacity: 0.55; transform: scale(0.7); box-shadow: 0 0 2px #4eff9a; }
    }

    /* ─── Top school chip ─────────────────────────────────── */
    .top-school-chip {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 2px; text-align: right;
    }
    .top-school-chip .chip-label {
      font-size: 0.68rem; font-weight: 600; color: var(--text-muted);
      letter-spacing: 0.8px; text-transform: uppercase;
    }
    .top-school-chip .chip-name {
      font-size: 0.82rem; font-weight: 700; color: #ffe07a;
      line-height: 1.3; max-width: 180px;
    }
    .top-school-chip .chip-stats {
      font-size: 0.72rem; color: var(--text-muted);
      display: flex; gap: 8px; justify-content: flex-end;
    }
    .chip-stat-item { display: flex; align-items: center; gap: 3px; }
    .chip-stat-item strong { color: #c7d7ff; }

    /* ─── Countdown ──────────────────────────────────────── */
    .countdown { text-align: center; }
    .countdown .label {
      color: var(--text-muted); font-size: 0.78rem;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
    }
    #countdown { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
    .time-box {
      min-width: 50px; padding: 7px 8px; border-radius: 10px;
      border: 1px solid rgba(145,177,255,0.3);
      background: rgba(22,36,66,0.55); text-align: center;
    }
    .time-box strong { display: block; font-size: 1.05rem; font-weight: 700; line-height: 1.2; }
    .time-box span { color: var(--text-muted); font-size: 0.68rem; letter-spacing: 0.7px; text-transform: uppercase; }

    /* ─── Section title ──────────────────────────────────── */
    .section-title { font-size: 1rem; margin-bottom: 12px; color: #d8e3ff; font-weight: 700; }

    /* ─── Podium card ─────────────────────────────────────── */
    .podium-card { padding: 16px 16px 20px; }

    /* Grid: 2nd | 1st | 3rd — 1st is wider and taller */
    .podium-grid {
      display: grid;
      grid-template-columns: 0.82fr 1fr 0.72fr;
      gap: 10px;
      align-items: flex-end;   /* align to bottom so podiums rise naturally */
      min-height: 280px;
    }

    /* Order: HTML order is 1st,2nd,3rd → reorder via CSS */
    .podium-item:nth-child(1) { order: 2; } /* 1st → center */
    .podium-item:nth-child(2) { order: 1; } /* 2nd → left */
    .podium-item:nth-child(3) { order: 3; } /* 3rd → right */

    .podium-item {
      position: relative;
      border: 1px solid rgba(170,191,255,0.22);
      border-radius: 14px;
      overflow: hidden;
      padding: 12px 10px 10px;
      background: rgba(19,31,57,0.82);
      transform-origin: bottom center;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      display: flex;
      flex-direction: column;
    }
    /* 1st place: tallest, prominent */
    .podium-item.podium-gold   { min-height: 270px; }
    /* 2nd place: medium */
    .podium-item.podium-silver { min-height: 220px; }
    /* 3rd place: shortest */
    .podium-item.podium-bronze { min-height: 190px; }
    .podium-item:hover { transform: translateY(-6px) !important; }
    .podium-item::before {
      content: ""; position: absolute; inset: 0;
      opacity: 0.2; pointer-events: none; z-index: 0;
    }
    .podium-item * { position: relative; z-index: 1; }

    .podium-rank {
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 7px;
    }

    /* ─── School identity ─────────────────────────────────── */
    .school-identity { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .logo-cell { position: relative; flex-shrink: 0; width: 38px; height: 38px; }
    .school-logo {
      width: 38px; height: 38px; object-fit: contain;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12); display: block;
    }
    .school-logo.is-hidden { display: none; }
    .school-logo-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800; letter-spacing: 0.4px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(90,144,255,0.5), rgba(140,200,255,0.35));
      border: 1px solid rgba(255,255,255,0.15); color: #eef4ff;
    }
    .school-logo-fallback.is-hidden { display: none; }
    .school-text { flex: 1; min-width: 0; }
    .school-title {
      font-size: 0.78rem; font-weight: 600; color: #e8eeff;
      line-height: 1.3;
      /* wrap on small screens */
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .podium-item .school-title { font-size: 0.82rem; }
    .media-unit { font-size: 0.68rem; color: var(--text-muted); margin-top: 3px; line-height: 1.3;
      word-break: break-word; overflow-wrap: break-word; }

    /* ─── Podium votes + bar ──────────────────────────────── */
    .podium-votes { font-size: 1.35rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }

    /* Stretchy bar — grows to fill remaining card space */
    .podium-height {
      margin-top: auto;   /* push to bottom of flex col */
      border-radius: 9px; width: 100%; min-height: 48px; flex: 1;
      max-height: 140px;
      background: rgba(255,255,255,0.05);
      position: relative; overflow: hidden;
    }
    .podium-height span {
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 0; border-radius: 6px;
    }

    /* ─── Medal colours ───────────────────────────────────── */
    .podium-gold {
      box-shadow: 0 0 28px rgba(255,204,77,0.35);
      border-color: rgba(255,217,100,0.7);
    }
    .podium-gold::before { background: linear-gradient(165deg,#ffd964,#8a5b00); }
    .podium-gold .podium-rank { color: #ffd964; }
    .podium-gold .podium-height span {
      background: linear-gradient(to top, #6d4500, #ffcc4d);
    }
    /* Gold glow animation */
    .podium-gold .podium-height span {
      animation: glowGold 2.8s ease-in-out infinite;
    }
    @keyframes glowGold {
      0%,100% { box-shadow: 0 0 16px rgba(255,200,60,0.5), 0 0 36px rgba(255,200,60,0.2); }
      50%      { box-shadow: 0 0 32px rgba(255,210,80,0.85), 0 0 64px rgba(255,200,60,0.4); }
    }

    .podium-silver { box-shadow: 0 0 20px rgba(213,223,244,0.22); }
    .podium-silver::before { background: linear-gradient(165deg,#d9e3f7,#556787); }
    .podium-silver .podium-rank { color: #d9e3f7; }
    .podium-silver .podium-height span {
      background: linear-gradient(to top,#4f607d,#d9e3f7);
      animation: glowSilver 3.2s ease-in-out infinite;
    }
    @keyframes glowSilver {
      0%,100% { box-shadow: 0 0 12px rgba(200,215,244,0.35), 0 0 28px rgba(180,200,240,0.15); }
      50%      { box-shadow: 0 0 26px rgba(215,228,255,0.65), 0 0 50px rgba(200,215,244,0.3); }
    }

    .podium-bronze { box-shadow: 0 0 20px rgba(215,155,110,0.22); }
    .podium-bronze::before { background: linear-gradient(165deg,#dfac82,#7f4a20); }
    .podium-bronze .podium-rank { color: #dfac82; }
    .podium-bronze .podium-height span {
      background: linear-gradient(to top,#733f1f,#d79b6e);
      animation: glowBronze 3.6s ease-in-out infinite;
    }
    @keyframes glowBronze {
      0%,100% { box-shadow: 0 0 12px rgba(210,150,100,0.35), 0 0 26px rgba(200,130,80,0.15); }
      50%      { box-shadow: 0 0 26px rgba(220,165,115,0.65), 0 0 50px rgba(210,150,100,0.3); }
    }

    .first-badge {
      display: inline-flex; align-items: center; gap: 5px; margin-top: 5px; margin-bottom: 4px;
      font-size: 0.72rem; font-weight: 700; color: #ffe5a8;
      letter-spacing: 0.4px; text-transform: uppercase;
    }

    /* ─── Leaderboard ─────────────────────────────────────── */
    .leaderboard-card { padding: 16px 16px 20px; }
    .board-list { display: grid; gap: 10px; }
    .board-item {
      border: 1px solid rgba(171,192,255,0.18);
      background: rgba(18,28,50,0.65);
      border-radius: 12px; padding: 10px 12px;
      transition: transform 0.28s ease, border-color 0.28s ease;
    }
    .board-item:hover { transform: translateY(-4px); border-color: rgba(171,205,255,0.45); }
    .board-meta {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 10px; margin-bottom: 8px;
    }
    .board-meta .school-identity { flex: 1; min-width: 0; margin-bottom: 0; }
    .board-votes { flex-shrink: 0; text-align: right; font-weight: 700; color: #c7d7ff; font-size: 0.88rem; }

    /* ─── Bar track & fill ────────────────────────────────── */
    .bar-track {
      position: relative; height: 10px; border-radius: 999px;
      background: rgba(132,161,238,0.15); overflow: hidden;
    }
    .bar-fill {
      height: 100%; width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #3a6fd8, #5a90ff, #8fc2ff);
      position: relative; overflow: hidden;
      animation: barPulse 2.4s ease-in-out infinite;
    }
    .bar-fill::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(100deg, transparent 15%, rgba(255,255,255,0.55) 50%, transparent 85%);
      transform: translateX(-130%);
      animation: shimmer 2.2s linear infinite;
    }

    /* ─── Status / footer ─────────────────────────────────── */
    .status { font-size: 0.84rem; color: var(--text-muted); padding: 12px 0 0; }
    .footer {
      text-align: center; padding: 18px 10px 6px;
      color: var(--text-muted); font-size: 0.84rem;
    }
    .export-updated {
      text-align: center; color: #d7e5ff; font-size: 0.78rem;
      margin-top: 28px; letter-spacing: 0.2px;
    }

    /* ─── FABs ────────────────────────────────────────────── */
    .share-fab-wrap {
      position: fixed; right: 14px; bottom: 14px;
      display: flex; flex-direction: column; gap: 8px; z-index: 50;
    }
    .fab-btn {
      width: 46px; height: 46px; border-radius: 999px;
      border: 1px solid rgba(168,197,255,0.42);
      background: linear-gradient(135deg, rgba(85,139,255,0.52), rgba(120,200,255,0.38));
      color: #eef4ff; font-size: 1.2rem;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
    }
    .fab-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 22px rgba(104,167,255,0.45); }
    .fab-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ─── Keyframes ───────────────────────────────────────── */
    @keyframes shimmer { to { transform: translateX(130%); } }
    @keyframes barPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(90,144,255,0.4), 0 0 24px rgba(90,144,255,0.2); }
      50%       { box-shadow: 0 0 20px rgba(90,144,255,0.75), 0 0 44px rgba(90,144,255,0.35); }
    }

    /* ─── RESPONSIVE ──────────────────────────────────────── */

    /* ≥ 641px: normal desktop layout */
    @media (min-width: 641px) {
      body { padding: 24px 20px 90px; }
      .podium-item { padding: 14px 14px 12px; }
      .logo-cell { width: 46px; height: 46px; }
      .school-logo { width: 46px; height: 46px; border-radius: 10px; }
      .school-logo-fallback { border-radius: 10px; }
      .school-title { font-size: 0.95rem; }
      .podium-item .school-title { font-size: 1rem; }
      .media-unit { font-size: 0.75rem; }
      .podium-votes { font-size: 1.55rem; }
      .podium-rank { font-size: 0.8rem; }
      .school-identity { gap: 12px; }
    }

    /* ≤ 640px MOBILE ──────────────────────────────────────── */
    @media (max-width: 640px) {
      body { padding: 8px 8px 70px; }

      /* Header: stack title left, right block right */
      .header { flex-direction: row; align-items: flex-start; padding: 10px 12px 10px; gap: 8px; flex-wrap: nowrap; }
      .title-block h1 { font-size: 1rem; }
      .title-block p { font-size: 0.72rem; }

      /* Right col shrinks */
      .header-right { align-items: flex-end; gap: 4px; }
      .top-school-chip .chip-name { max-width: 120px; font-size: 0.72rem; }
      .top-school-chip .chip-label { font-size: 0.6rem; }
      .top-school-chip .chip-stats { font-size: 0.62rem; }
      .live-badge { font-size: 0.62rem; padding: 3px 7px; }

      /* Countdown: centered on mobile */
      .countdown-row { padding: 8px 12px 8px; }
      .countdown .label { font-size: 0.68rem; margin-bottom: 4px; }
      .time-box { min-width: 40px; padding: 5px 6px; }
      .time-box strong { font-size: 0.9rem; }
      .time-box span { font-size: 0.6rem; }
      #countdown { justify-content: center; gap: 5px; }

      /* Podium: 3 columns ALWAYS on mobile — compact */
      .podium-card { padding: 10px 8px 10px; }
      .podium-grid {
        grid-template-columns: 0.82fr 1fr 0.72fr;
        gap: 6px;
        align-items: flex-end;
        min-height: 200px;
      }
      .podium-item.podium-gold   { min-height: 200px; }
      .podium-item.podium-silver { min-height: 162px; }
      .podium-item.podium-bronze { min-height: 140px; }
      .podium-item { padding: 8px 6px 7px; border-radius: 11px; }
      .podium-item:hover { transform: none !important; }

      /* Compact identity inside podium */
      .school-identity { gap: 5px; margin-bottom: 5px; }
      .logo-cell { width: 28px; height: 28px; }
      .school-logo { width: 28px; height: 28px; border-radius: 6px; }
      .school-logo-fallback { border-radius: 6px; font-size: 0.6rem; }
      .school-title { font-size: 0.65rem !important; }
      .media-unit { font-size: 0.58rem !important; display: none; } /* hide media unit on mobile for space */
      .podium-rank { font-size: 0.62rem; margin-bottom: 5px; }
      .podium-votes { font-size: 1rem; }
      .first-badge { font-size: 0.58rem; gap: 3px; margin-top: 3px; }
      .podium-height { min-height: 36px; }

      /* Leaderboard */
      .leaderboard-card { padding: 10px 8px 10px; }
      .board-meta { flex-wrap: wrap; gap: 5px; }
      .board-votes { font-size: 0.8rem; }
      .board-item { padding: 8px 10px; border-radius: 10px; }
      .board-list { gap: 7px; }

      /* Footer */
      .footer { font-size: 0.74rem; padding: 10px 8px 2px; }
      .dashboard { gap: 8px; }
    }

    /* Very small phones */
    @media (max-width: 360px) {
      .school-title { font-size: 0.58rem !important; }
      .podium-votes { font-size: 0.88rem; }
      .podium-item { padding: 7px 5px 6px; }
      .logo-cell { width: 24px; height: 24px; }
      .school-logo { width: 24px; height: 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
  <div class="bg-orb orb-4"></div>

  <main class="dashboard" id="dashboard">

    <!-- Header -->
    <section class="glass header">
      <div class="title-block">
        <h1>Nethinethera Vote Tracker</h1>
        <p>Live Rank Votes</p>
      </div>
      <div class="header-right">
        <span class="live-badge"><span class="live-dot"></span>Live</span>
        <div class="top-school-chip" id="topSchoolChip">
          <span class="chip-label">🏆 Leading</span>
          <span class="chip-name" id="chipName">Loading…</span>
          <div class="chip-stats">
            <span class="chip-stat-item"><strong id="chipVotes">—</strong> total votes</span>
            <span class="chip-stat-item"><strong id="chipSchools">—</strong> schools</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Countdown (separate row for clean layout) -->
    <section class="glass countdown-row" style="padding:12px 18px 14px;">
      <div class="countdown">
        <div class="label">Countdown to April 21, 2026</div>
        <div id="countdown"></div>
      </div>
    </section>

    <!-- Podium -->
    <section class="glass podium-card">
      <h2 class="section-title">Top 3 Podium 🏆</h2>
      <div id="podium" class="podium-grid"></div>
    </section>

    <!-- Leaderboard -->
    <section class="glass leaderboard-card">
      <h2 class="section-title">Leaderboard</h2>
      <div id="board" class="board-list"></div>
      <p id="status" class="status"></p>
      <p id="exportUpdated" class="export-updated"></p>
    </section>

    <footer class="footer">
      &copy; Educational Media Unit of Maris Stella College Negombo.
    </footer>

  </main>

  <div class="share-fab-wrap">
    <button id="shareBtn"    class="fab-btn" type="button" title="Share PNG"    aria-label="Share PNG">🚀</button>
    <button id="downloadBtn" class="fab-btn" type="button" title="Download PNG" aria-label="Download PNG">📥</button>
  </div>

  <script>
  // ─── School Metadata ───────────────────────────────────────────────────────
  const SCHOOLS_META = {
    "59": { school: "Maris Stella College, Negombo",    mediaUnit: "Educational Media Unit",                  logo: "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/1.png" },
    "58": { school: "Galahitiyawa Central College",     mediaUnit: "Parakum Sihanada Media Unit",             logo: "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/2.png" },
    "24": { school: "Yasodara Balika Vidyalaya",        mediaUnit: "Media Unit Of Yasodara Vidyalaya",        logo: "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/6.png" },
    "57": { school: "Devi Balika Vidyalaya",            mediaUnit: "Media unit of Devi Balika Vidyalaya",     logo: "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/3.png" },
    "16": { school: "Nugegoda South International School (NSIS)", mediaUnit: "Media Unit of NSIS Nittambuwa", logo: "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/10.png" },
    "21": { school: "D. S. Senanayake College",         mediaUnit: "Media circle of D. S. Senanayake College",logo: "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/8.png" },
    "51": { school: "St. Aloysius' College, Galle",     mediaUnit: "Aloysian Mass Media Unit",                logo: "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/4.png" },
    "19": { school: "Mahinda Rajapaksa College",        mediaUnit: "Mahindians Media and Broadcasting Unit",  logo: "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/9.png" },
    "33": { school: "Anula Vidyalaya",                  mediaUnit: "Media Unit of Anula Vidyalaya",           logo: "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/5.png" },
    "23": { school: "Muslim Ladies College",            mediaUnit: "Media Unit of Muslim Ladies College",     logo: "https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/7.png" }
  };

  const schoolNames = {
    59:"Maris Stella", 58:"Galahitiyawa", 24:"Yasodara Balika", 57:"Devi Balika",
    16:"NSIS", 21:"D.S. Senanayake", 51:"St. Aloysius", 19:"Mahinda Rajapaksha",
    33:"Anula", 23:"Muslim Ladies"
  };

  const votesApiUrl = "https://osxijjbjgxvaeurpghtv.supabase.co/rest/v1/mpmu_votes?select=registered_candidate,vote_count&apikey=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zeGlqamJqZ3h2YWV1cnBnaHR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NTA4NDgsImV4cCI6MjA4NzMyNjg0OH0.8SxJtzpnr0snvzXke_bIwkcVpwUfMxRfb0Y407Z0UE4";

  const fallbackVotes = [
    { registered_candidate: 16, vote_count: 60 },  { registered_candidate: 21, vote_count: 54 },
    { registered_candidate: 19, vote_count: 10 },  { registered_candidate: 23, vote_count: 7 },
    { registered_candidate: 51, vote_count: 17 },  { registered_candidate: 33, vote_count: 9 },
    { registered_candidate: 59, vote_count: 325 }, { registered_candidate: 57, vote_count: 113 },
    { registered_candidate: 58, vote_count: 159 }, { registered_candidate: 24, vote_count: 123 }
  ];

  // ─── DOM refs ──────────────────────────────────────────────────────────────
  const podiumEl    = document.getElementById("podium");
  const boardEl     = document.getElementById("board");
  const statusEl    = document.getElementById("status");
  const countdownEl = document.getElementById("countdown");
  const shareBtn    = document.getElementById("shareBtn");
  const downloadBtn = document.getElementById("downloadBtn");
  const chipName    = document.getElementById("chipName");
  const chipVotes   = document.getElementById("chipVotes");
  const chipSchools = document.getElementById("chipSchools");

  let schoolsByCandidate = {};
  let hasInitialRender   = false;
  let lastDataSignature  = "";
  let orbsInitialized    = false;

  // ─── Orbs ─────────────────────────────────────────────────────────────────
  function initOrbs() {
    if (orbsInitialized) return;
    orbsInitialized = true;
    const orbs = document.querySelectorAll(".bg-orb");
    gsap.to(orbs, { opacity: 0.38, duration: 2, stagger: 0.3, ease: "power1.out" });
    const configs = [
      { x:[0,40,-20,0], y:[0,-50,-20,0], d:18, delay:0 },
      { x:[0,-30,30,0], y:[0,-40,20,0],  d:22, delay:-6 },
      { x:[0,25,-35,0], y:[0,30,-25,0],  d:20, delay:-11 },
      { x:[0,-40,15,0], y:[0,-20,40,0],  d:16, delay:-4 },
    ];
    orbs.forEach((orb, i) => {
      const c = configs[i] || configs[0];
      gsap.to(orb, {
        motionPath: { path: c.x.map((x, j) => ({ x, y: c.y[j] })), curviness: 1.6 },
        duration: c.d, repeat: -1, yoyo: true, ease: "sine.inOut", delay: c.delay,
      });
    });
  }

  // ─── School meta helpers ───────────────────────────────────────────────────
  function loadSchoolsMeta() {
    const out = {};
    for (const [k, v] of Object.entries(SCHOOLS_META)) out[Number(k)] = v;
    schoolsByCandidate = out;
  }

  function getSchoolMeta(id) {
    const m = schoolsByCandidate[id];
    if (m && m.school) return m;
    return { school: (schoolNames[id] || `School #${id}`), mediaUnit: "", logo: "" };
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function getInitials(label) {
    const parts = String(label).replace(/['']/g," ").split(/\s+/).filter(Boolean);
    return parts.length >= 2 ? (parts[0][0]+parts[1][0]).toUpperCase() : (label.slice(0,2)||"?").toUpperCase();
  }

  function schoolIdentityHtml(meta) {
    const initials = getInitials(meta.school);
    const hasLogo  = Boolean(meta.logo);
    const imgTag   = hasLogo
      ? `<img class="school-logo" src="${escapeHtml(meta.logo)}" alt="${escapeHtml(meta.school)} logo" crossorigin="anonymous" loading="lazy" onerror="this.classList.add('is-hidden');this.nextElementSibling.classList.remove('is-hidden');">`
      : "";
    return `
      <div class="school-identity">
        <div class="logo-cell">
          ${imgTag}
          <div class="school-logo-fallback${hasLogo?' is-hidden':''}">${escapeHtml(initials)}</div>
        </div>
        <div class="school-text">
          <div class="school-title">${escapeHtml(meta.school)}</div>
          ${meta.mediaUnit ? `<div class="media-unit">${escapeHtml(meta.mediaUnit)}</div>` : ""}
        </div>
      </div>`;
  }

  // ─── Update top-school chip ────────────────────────────────────────────────
  function updateChip(sortedVotes) {
    if (!sortedVotes.length) return;
    const top  = sortedVotes[0];
    const meta = getSchoolMeta(top.registered_candidate);
    // Short name
    const short = meta.school.split(",")[0].trim();
    chipName.textContent   = short;
    // Total combined votes of ALL schools
    const totalVotes = sortedVotes.reduce((sum, v) => sum + v.vote_count, 0);
    chipVotes.textContent  = totalVotes.toLocaleString();
    chipSchools.textContent = sortedVotes.length;
  }

  // ─── Data normalisation ───────────────────────────────────────────────────
  function normalizeVotes(data) {
    return data
      .map(i => ({ registered_candidate: Number(i.registered_candidate), vote_count: Number(i.vote_count) }))
      .filter(i => !isNaN(i.registered_candidate) && !isNaN(i.vote_count))
      .sort((a, b) => b.vote_count - a.vote_count);
  }

  // ─── Countdown ────────────────────────────────────────────────────────────
  const prevCountdown = { d:null, h:null, m:null, s:null };
  function renderCountdown() {
    const target = new Date("2026-04-21T00:00:00"), diff = target - new Date();
    if (diff <= 0) { countdownEl.textContent = "EXPIRED"; return; }
    const d = Math.floor(diff/86400000),
          h = Math.floor((diff%86400000)/3600000),
          m = Math.floor((diff%3600000)/60000),
          s = Math.floor((diff%60000)/1000);
    const units = [
      { key:"d", val:d, label:"Days" },
      { key:"h", val:h, label:"Hrs" },
      { key:"m", val:m, label:"Min" },
      { key:"s", val:s, label:"Sec" },
    ];
    if (!countdownEl.children.length) {
      countdownEl.innerHTML = units.map(u =>
        `<div class="time-box" data-unit="${u.key}"><strong>${u.val}</strong><span>${u.label}</span></div>`
      ).join("");
    } else {
      units.forEach(u => {
        if (prevCountdown[u.key] !== u.val) {
          const box    = countdownEl.querySelector(`[data-unit="${u.key}"]`);
          const strong = box?.querySelector("strong");
          if (strong) {
            strong.textContent = u.val;
            gsap.fromTo(strong, { y:-8, opacity:0, scale:1.2 }, { y:0, opacity:1, scale:1, duration:0.3, ease:"back.out(2)" });
          }
          prevCountdown[u.key] = u.val;
        }
      });
    }
    Object.assign(prevCountdown, { d, h, m, s });
  }

  // ─── Full render ──────────────────────────────────────────────────────────
  function renderDashboard(sortedVotes) {
    const top3   = sortedVotes.slice(0, 3);
    const others = sortedVotes.slice(3);
    const max    = sortedVotes[0]?.vote_count || 1;
    const rankClass = ["podium-gold","podium-silver","podium-bronze"];
    const labels    = ["1st Place","2nd Place","3rd Place"];

    podiumEl.innerHTML = top3.map((item, i) => {
      const h    = Math.max(30, (item.vote_count / max) * 100);
      const meta = getSchoolMeta(item.registered_candidate);
      return `<article class="podium-item ${rankClass[i]}" data-candidate="${item.registered_candidate}">
        <div class="podium-rank">${labels[i]}</div>
        ${schoolIdentityHtml(meta)}
        ${i===0 ? "<div class='first-badge'>🏆 Champion</div>" : ""}
        <div class="podium-votes">${item.vote_count.toLocaleString()}</div>
        <div class="podium-height"><span data-height="${h}" style="height:0"></span></div>
      </article>`;
    }).join("");

    boardEl.innerHTML = others.map(item => {
      const w    = (item.vote_count / max) * 100;
      const meta = getSchoolMeta(item.registered_candidate);
      return `<article class="board-item" data-candidate="${item.registered_candidate}">
        <div class="board-meta">
          ${schoolIdentityHtml(meta)}
          <div class="board-votes">${item.vote_count.toLocaleString()} votes</div>
        </div>
        <div class="bar-track"><div class="bar-fill" data-width="${w}" style="width:0%"></div></div>
      </article>`;
    }).join("");

    updateChip(sortedVotes);
    animateInitialEntry();
    hasInitialRender = true;

    const now = new Date();
    statusEl.textContent = `Live · Updated ${now.toLocaleTimeString()}`;
  }

  // ─── Entry animation ───────────────────────────────────────────────────────
  function animateInitialEntry() {
    const tl = gsap.timeline();
    tl.from(".glass",        { y:20, opacity:0, duration:0.5, stagger:0.1, ease:"power2.out" })
      .from(".podium-item",  { y:25, opacity:0, duration:0.5, stagger:0.1, ease:"back.out(1.4)" }, "-=0.25")
      .from(".board-item",   { y:16, opacity:0, duration:0.4, stagger:0.06, ease:"power2.out" }, "-=0.3");

    tl.add(() => {
      gsap.utils.toArray(".podium-height span").forEach(b =>
        gsap.to(b, { height: b.dataset.height + "%", duration: 1.1, ease: "power2.out" })
      );
      gsap.utils.toArray(".bar-fill").forEach(b =>
        gsap.to(b, { width: b.dataset.width + "%", duration: 1.2, ease: "power2.out" })
      );
    }, "-=0.1");
  }

  // ─── Smart update ─────────────────────────────────────────────────────────
  function updateOnlyChangedValues(sortedVotes) {
    const max = sortedVotes[0]?.vote_count || 1;
    const currentIds = Array.from(document.querySelectorAll("[data-candidate]")).map(el => Number(el.dataset.candidate));
    const nextIds    = sortedVotes.map(v => v.registered_candidate);

    if (JSON.stringify(currentIds) !== JSON.stringify(nextIds)) {
      gsap.to([...podiumEl.children, ...boardEl.children], {
        opacity:0, y:-8, duration:0.22, stagger:0.03,
        onComplete: () => { renderDashboard(sortedVotes); }
      });
      return;
    }

    sortedVotes.forEach(item => {
      const node = document.querySelector(`[data-candidate="${item.registered_candidate}"]`);
      if (!node) return;
      const isPodium  = node.classList.contains("podium-item");
      const voteEl    = node.querySelector(isPodium ? ".podium-votes" : ".board-votes");
      const bar       = node.querySelector(isPodium ? ".podium-height span" : ".bar-fill");
      const nextLabel = item.vote_count.toLocaleString() + (isPodium ? "" : " votes");

      if (voteEl && voteEl.textContent !== nextLabel) {
        voteEl.textContent = nextLabel;
        gsap.fromTo(voteEl, { scale:1.22, color:"#fff" }, { scale:1, color:"", duration:0.45, ease:"back.out(2)" });
      }
      if (bar) {
        const val  = isPodium ? Math.max(30, (item.vote_count / max) * 100) : (item.vote_count / max) * 100;
        const prop = isPodium ? "height" : "width";
        gsap.to(bar, { [prop]: val + "%", duration:0.7, ease:"power2.out" });
      }
    });

    updateChip(sortedVotes);
    statusEl.textContent = `Auto-updated ${new Date().toLocaleTimeString()}`;
  }

  // ─── Load votes ────────────────────────────────────────────────────────────
  async function loadVotes() {
    try {
      if (!Object.keys(schoolsByCandidate).length) loadSchoolsMeta();
      const res  = await fetch(votesApiUrl, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data       = await res.json();
      const normalized = normalizeVotes(data);
      const sig        = JSON.stringify(normalized);
      if (!hasInitialRender)            { renderDashboard(normalized);          lastDataSignature = sig; }
      else if (sig !== lastDataSignature) { updateOnlyChangedValues(normalized); lastDataSignature = sig; }
    } catch (e) {
      if (!hasInitialRender) {
        loadSchoolsMeta();
        renderDashboard(normalizeVotes(fallbackVotes));
      }
      statusEl.textContent = "Updating…";
    }
  }

  // ─── PNG capture ───────────────────────────────────────────────────────────
  async function capture() {
    const isMobile  = window.innerWidth <= 640;
    const dashboard = document.querySelector(".dashboard");

    if (isMobile) {
      // 9:16 portrait — 1080×1920
      const W = 1080, H = 1920;
      const orig = { width: dashboard.style.width, maxWidth: dashboard.style.maxWidth, transform: dashboard.style.transform, overflow: dashboard.style.overflow };
      dashboard.style.width    = W + "px";
      dashboard.style.maxWidth = W + "px";
      dashboard.style.transform = "none";
      dashboard.style.overflow = "visible";
      const canvas = await html2canvas(dashboard, {
        scale: 1, useCORS: true, backgroundColor: "#050917",
        width: W, height: H, windowWidth: W, windowHeight: H,
        scrollY: 0
      });
      dashboard.style.width    = orig.width;
      dashboard.style.maxWidth = orig.maxWidth;
      dashboard.style.transform = orig.transform;
      dashboard.style.overflow = orig.overflow;
      return canvas.toDataURL("image/png");
    }
    const canvas = await html2canvas(dashboard, { scale:2, useCORS:true, backgroundColor:"#050917" });
    return canvas.toDataURL("image/png");
  }

  shareBtn.onclick = async () => {
    shareBtn.disabled = true;
    try {
      const img  = await capture();
      const res  = await fetch(img);
      const blob = await res.blob();
      const file = new File([blob], "votes.png", { type:"image/png" });
      if (navigator.canShare && navigator.canShare({ files:[file] })) {
        await navigator.share({ files:[file], title:"Nethinethera Vote Tracker" });
      } else {
        alert("Sharing not supported — use the download button instead.");
      }
    } catch (e) { /* user cancelled */ }
    shareBtn.disabled = false;
  };

  downloadBtn.onclick = async () => {
    downloadBtn.disabled = true;
    const a = document.createElement("a");
    a.href = await capture(); a.download = "votes.png"; a.click();
    downloadBtn.disabled = false;
  };

  // ─── Bootstrap ─────────────────────────────────────────────────────────────
  initOrbs();
  renderCountdown();
  setInterval(renderCountdown, 1000);
  loadVotes();
  setInterval(loadVotes, 5000);
  </script>
</body>
</html>
